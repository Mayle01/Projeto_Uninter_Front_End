<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Acompanhe o status do seu pedido em tempo real — Raízes do Nordeste.">
  <title>Acompanhamento — Raízes do Nordeste</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/responsive.css">
  <style>
    .tracking-page { max-width: 800px; margin: 0 auto; }
    .order-info-card { background: var(--gradient-card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: var(--space-xl); margin-bottom: var(--space-xl); }
    .order-number { font-family: var(--font-display); font-size: 2rem; font-weight: 900; color: var(--primary); }
    .order-meta { display: flex; gap: var(--space-xl); margin-top: var(--space-md); flex-wrap: wrap; }
    .order-meta-item { display: flex; align-items: center; gap: var(--space-sm); font-size: 0.9rem; color: var(--text-secondary); }

    .status-timeline { background: var(--gradient-card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: var(--space-2xl); margin-bottom: var(--space-xl); }
    .timeline { position: relative; padding-left: 40px; }
    .timeline::before { content: ''; position: absolute; left: 15px; top: 0; bottom: 0; width: 2px; background: var(--border); }
    .timeline-item { position: relative; padding-bottom: var(--space-2xl); }
    .timeline-item:last-child { padding-bottom: 0; }
    .timeline-dot { position: absolute; left: -33px; width: 28px; height: 28px; border-radius: 50%; background: var(--bg-card); border: 2px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 0.7rem; z-index: 1; }
    .timeline-item.completed .timeline-dot { background: var(--success); border-color: var(--success); color: white; }
    .timeline-item.active .timeline-dot { background: var(--primary); border-color: var(--primary); color: white; box-shadow: 0 0 12px rgba(232,93,4,0.4); animation: pulse-glow 2s ease-in-out infinite; }
    .timeline-title { font-family: var(--font-display); font-weight: 600; margin-bottom: var(--space-xs); }
    .timeline-item.completed .timeline-title { color: var(--success); }
    .timeline-item.active .timeline-title { color: var(--primary); }
    .timeline-desc { font-size: 0.85rem; color: var(--text-secondary); }
    .timeline-time { font-size: 0.75rem; color: var(--text-muted); margin-top: var(--space-xs); }

    .order-items-card { background: var(--gradient-card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: var(--space-xl); }
    .order-item-row { display: flex; justify-content: space-between; align-items: center; padding: var(--space-sm) 0; border-bottom: 1px solid var(--border); }
    .order-item-row:last-child { border-bottom: none; }

    .live-indicator { display: inline-flex; align-items: center; gap: 6px; padding: 4px 12px; background: rgba(63,185,80,0.1); border: 1px solid rgba(63,185,80,0.2); border-radius: var(--radius-full); font-size: 0.75rem; color: var(--success); font-weight: 600; }
    .live-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--success); animation: pulse-glow 1.5s ease-in-out infinite; }

    .simulation-controls { background: rgba(88,166,255,0.05); border: 1px solid rgba(88,166,255,0.15); border-radius: var(--radius-md); padding: var(--space-md); margin-top: var(--space-xl); text-align: center; }
    .simulation-controls p { font-size: 0.8rem; color: var(--info); margin-bottom: var(--space-sm); }
    .simulation-controls .sim-btns { display: flex; gap: var(--space-sm); justify-content: center; flex-wrap: wrap; }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="container">
      <a href="index.html" class="navbar-brand"><div class="brand-icon">🌿</div><span>Raízes do <span class="text-gradient">Nordeste</span></span></a>
      <div class="navbar-nav" id="navbarNav">
        <a href="index.html">Início</a><a href="cardapio.html">Cardápio</a><a href="acompanhamento.html" class="active">Meu Pedido</a><a href="fidelidade.html">Fidelidade</a>
      </div>
      <div class="navbar-actions">
        <a href="carrinho.html" class="cart-btn" title="Carrinho">🛒<span class="cart-badge" style="display:none">0</span></a>
        <a href="login.html" class="btn btn-sm btn-primary login-btn">Entrar</a>
        <div class="mobile-toggle" onclick="toggleMobileNav()"><span></span><span></span><span></span></div>
      </div>
    </div>
  </nav>

  <main class="page-content">
    <div class="container tracking-page">
      <div class="flex-between mb-xl" style="flex-wrap:wrap; gap:var(--space-md);">
        <h1>Acompanhar <span class="text-gradient">Pedido</span></h1>
        <div class="live-indicator"><span class="live-dot"></span> Atualização em tempo real</div>
      </div>

      <div id="orderContent">
        <!-- Generated by JS -->
      </div>

      <div class="empty-state" id="noOrder" style="display:none;">
        <div class="empty-icon">📋</div>
        <h3>Nenhum pedido ativo</h3>
        <p>Faça um pedido pelo nosso cardápio para acompanhar o status aqui.</p>
        <a href="cardapio.html" class="btn btn-primary btn-lg mt-lg">Ver Cardápio</a>
      </div>
    </div>
  </main>

  <footer class="footer"><div class="container"><div class="footer-bottom"><span>© 2026 Raízes do Nordeste.</span><span>Projeto Multidisciplinar — UNINTER</span></div></div></footer>

  <script src="js/app.js"></script>
  <script>
    const statusSteps = [
      { key: 'received', icon: '📥', title: 'Pedido Recebido', desc: 'Seu pedido foi registrado no sistema e enviado para a cozinha.' },
      { key: 'preparing', icon: '👨‍🍳', title: 'Em Preparo', desc: 'Nossa equipe está preparando seus itens com carinho nordestino.' },
      { key: 'ready', icon: '✅', title: 'Pronto para Retirada', desc: 'Seu pedido está pronto! Dirija-se ao balcão para retirada.' },
      { key: 'delivered', icon: '🎉', title: 'Retirado / Entregue', desc: 'Pedido entregue com sucesso. Bom apetite!' }
    ];

    function getOrder() {
      try { return JSON.parse(localStorage.getItem('raizes_current_order')); } catch { return null; }
    }

    function renderOrder() {
      const order = getOrder();
      const content = document.getElementById('orderContent');
      const noOrder = document.getElementById('noOrder');

      if (!order) {
        content.style.display = 'none';
        noOrder.style.display = 'block';
        return;
      }

      const currentIdx = statusSteps.findIndex(s => s.key === order.status);
      const channels = { pickup: '⚡ Retirada Rápida', counter: '🧑‍🍳 Balcão', totem: '🖥️ Totem', app: '📱 Aplicativo' };
      const date = new Date(order.date);

      content.innerHTML = `
        <div class="order-info-card">
          <div class="flex-between" style="flex-wrap:wrap; gap:var(--space-md);">
            <div>
              <p class="text-sm" style="color:var(--text-muted);">Número do pedido</p>
              <div class="order-number">#${order.id}</div>
            </div>
            <span class="badge badge-${currentIdx >= 3 ? 'success' : 'primary'}" style="font-size:0.85rem; padding:8px 16px;">
              ${statusSteps[currentIdx]?.icon} ${statusSteps[currentIdx]?.title}
            </span>
          </div>
          <div class="order-meta">
            <div class="order-meta-item">📍 ${order.unit}</div>
            <div class="order-meta-item">${channels[order.channel] || order.channel}</div>
            <div class="order-meta-item">🕐 ${date.toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'})}</div>
          </div>
        </div>

        <div class="status-timeline">
          <h3 class="mb-xl">Status do Pedido</h3>
          <div class="timeline">
            ${statusSteps.map((step, i) => `
              <div class="timeline-item ${i < currentIdx ? 'completed' : ''} ${i === currentIdx ? 'active' : ''}">
                <div class="timeline-dot">${i <= currentIdx ? '✓' : (i + 1)}</div>
                <div class="timeline-title">${step.icon} ${step.title}</div>
                <div class="timeline-desc">${step.desc}</div>
                ${i <= currentIdx ? `<div class="timeline-time">${i < currentIdx ? 'Concluído' : 'Agora'}</div>` : ''}
              </div>
            `).join('')}
          </div>
        </div>

        <div class="order-items-card">
          <h3 class="mb-lg">Itens do Pedido</h3>
          ${order.items.map(item => `
            <div class="order-item-row">
              <span>${item.qty}x ${item.name}</span>
              <span style="color:var(--primary); font-weight:600;">${formatCurrency(item.price * item.qty)}</span>
            </div>
          `).join('')}
          <div class="order-item-row" style="font-weight:700; font-family:var(--font-display); font-size:1.1rem; border-top:1px solid var(--border); margin-top:var(--space-sm); padding-top:var(--space-md);">
            <span>Total</span>
            <span style="color:var(--primary);">${formatCurrency(order.total)}</span>
          </div>
        </div>

        <div class="simulation-controls">
          <p>⚙️ Simulação — Clique para avançar o status do pedido:</p>
          <div class="sim-btns">
            <button class="btn btn-sm btn-secondary" onclick="setStatus('received')">📥 Recebido</button>
            <button class="btn btn-sm btn-secondary" onclick="setStatus('preparing')">👨‍🍳 Preparando</button>
            <button class="btn btn-sm btn-secondary" onclick="setStatus('ready')">✅ Pronto</button>
            <button class="btn btn-sm btn-secondary" onclick="setStatus('delivered')">🎉 Entregue</button>
          </div>
        </div>
      `;
    }

    function setStatus(status) {
      const order = getOrder();
      if (!order) return;
      order.status = status;
      localStorage.setItem('raizes_current_order', JSON.stringify(order));
      renderOrder();
      Toast.show(`Status atualizado: ${statusSteps.find(s => s.key === status)?.title}`, 'success');
    }

    document.addEventListener('DOMContentLoaded', renderOrder);
  </script>
</body>
</html>
